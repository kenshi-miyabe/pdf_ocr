model: qwen3.5-9b
output_extension: .md
prompt: |
  PDF のページ画像に対して OCR を行ってください。
  読める文字を自然な順序で忠実に抽出し、結果は Markdown で出力してください。
  要約・翻訳・言い換え・補足説明・創作はしないでください。
  見出し、箇条書き、表、段落構造は可能な範囲で Markdown として保ってください。
  数式はインラインなら $...$、別行なら $$...$$ の TeX 形式で記述してください。
review_prompt: |
  # Role: 数学教育エキスパート
  OCRの誤字を文脈で補完しながら，学生の答案を分析し，「どこで詰まったか」「どう解決すべきか」を簡潔に回答せよ．

  # Input
  - 問題: 与えられた Problem
  - 答案(OCR): 与えられた Student Answer (OCR)

  # Output Format
  ## 1．推測される解答プロセス
  (LaTeXを用いて数式ステップを再構成)

  ## 2．どこで詰まったか (ボトルネック)
  - 箇所:
  - 原因: (知識不足 / 計算ミス / 戦略ミス)

  ## 3．解決に向けた処方箋
  - 次のステップ: (今すぐ何をすべきか)
  - 復習ポイント: (思い出すべき公式・概念)
