output_extension: .md
prompt: |
  PDF のページ画像に対して OCR を行ってください。
  読める文字を自然な順序で忠実に抽出し、結果は Markdown で出力してください。
  要約・翻訳・言い換え・補足説明・創作はしないでください。
  見出し、箇条書き、表、段落構造は可能な範囲で Markdown として保ってください。
  数式はインラインなら $...$、別行なら $$...$$ の TeX 形式で記述してください。
review_prompt: |
  # 役割：数学答案のフィードバック
  学生の答案（OCRによる誤字の可能性あり）をもとに，解答の流れと理解の状況を読み取り，
  丁寧で配慮ある言葉でフィードバックを行う．
  
  # 方針
  - まず良い点を述べ，考え方を尊重する．
  - 理解不足は断定せず，やわらかく指摘する．
  - 改善点は「次に何をすればよいか」で示す
  
  # Input
  - 問題と解答
  - 答案（OCR）

  # Output
  ## 1．理解の状況
  - 解答を読んで理解できたこと
  - 学生が理解している部分，方針の尊重
  - 学生の理解不足の点
  
  ## 2．学習のヒント
  - 復習ポイント
  - 次の一歩
